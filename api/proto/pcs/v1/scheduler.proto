syntax = "proto3";

package pcs.v1;

option go_package = "github.com/peter941221/Proof-Carrying-Scheduler-for-Heterogeneous-AI-Compute/api/proto/pcs/v1;pcsv1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

enum TaskKind {
  TASK_KIND_UNSPECIFIED = 0;
  TASK_KIND_TRAINING = 1;
  TASK_KIND_INFERENCE = 2;
}

enum DecisionStatus {
  DECISION_STATUS_UNSPECIFIED = 0;
  DECISION_STATUS_FEASIBLE = 1;
  DECISION_STATUS_PARTIAL = 2;
  DECISION_STATUS_INFEASIBLE = 3;
}

enum SolverKind {
  SOLVER_KIND_UNSPECIFIED = 0;
  SOLVER_KIND_FAST_PATH = 1;
  SOLVER_KIND_GUROBI = 2;
  SOLVER_KIND_CP_SAT = 3;
  SOLVER_KIND_MIN_COST_FLOW = 4;
}

enum RelOp {
  REL_OP_UNSPECIFIED = 0;
  REL_OP_LE = 1;
  REL_OP_GE = 2;
  REL_OP_EQ = 3;
}

enum ConstraintKind {
  CONSTRAINT_KIND_UNSPECIFIED = 0;
  CONSTRAINT_KIND_RESOURCE = 1;
  CONSTRAINT_KIND_COMPATIBILITY = 2;
  CONSTRAINT_KIND_LATENCY = 3;
  CONSTRAINT_KIND_BUDGET = 4;
  CONSTRAINT_KIND_CARBON = 5;
  CONSTRAINT_KIND_FAULT_DOMAIN = 6;
  CONSTRAINT_KIND_GANG = 7;
  CONSTRAINT_KIND_RISK = 8;
  CONSTRAINT_KIND_POLICY = 9;
}

enum FallbackCode {
  FALLBACK_CODE_UNSPECIFIED = 0;
  FALLBACK_CODE_NONE = 1;
  FALLBACK_CODE_TIMEOUT = 2;
  FALLBACK_CODE_SOLVER_BUDGET_EXCEEDED = 3;
  FALLBACK_CODE_NO_CANDIDATE = 4;
  FALLBACK_CODE_POLICY_OVERRIDE = 5;
  FALLBACK_CODE_INFEASIBLE = 6;
  FALLBACK_CODE_DEGRADED_SIGNAL = 7;
}

enum CertificateLevel {
  CERTIFICATE_LEVEL_UNSPECIFIED = 0;
  CERTIFICATE_LEVEL_FEASIBLE = 1;
  CERTIFICATE_LEVEL_BOUNDED = 2;
  CERTIFICATE_LEVEL_CONFLICT = 3;
  CERTIFICATE_LEVEL_COUNTERFACTUAL = 4;
  CERTIFICATE_LEVEL_SHADOW = 5;
}

enum IssueSeverity {
  ISSUE_SEVERITY_UNSPECIFIED = 0;
  ISSUE_SEVERITY_INFO = 1;
  ISSUE_SEVERITY_WARNING = 2;
  ISSUE_SEVERITY_ERROR = 3;
  ISSUE_SEVERITY_CRITICAL = 4;
}

enum ClaimStatus {
  CLAIM_STATUS_UNSPECIFIED = 0;
  CLAIM_STATUS_PLANNED = 1;
  CLAIM_STATUS_MODELED = 2;
  CLAIM_STATUS_CHECKED = 3;
  CLAIM_STATUS_IMPLEMENTED = 4;
  CLAIM_STATUS_VERIFIED = 5;
}

message ResourceVector {
  double cpu_cores = 1;
  double memory_gib = 2;
  double gpu_count = 3;
  double gpu_memory_gib = 4;
  double storage_gib = 5;
  double net_mbps = 6;
  double power_watts = 7;
  string accelerator_type = 8;
  map<string, double> ext = 9;
}

message Node {
  string node_id = 1;
  string cluster_id = 2;
  string region = 3;
  string zone = 4;
  string fault_domain = 5;
  bool spot = 6;
  map<string, string> labels = 7;
  ResourceVector capacity_total = 8;
  ResourceVector capacity_free = 9;
  double gpu_hour_cost_usd = 10;
  double cpu_hour_cost_usd = 11;
  double carbon_gco2_per_kwh = 12;
  double interruption_prob = 13;
  double health_score = 14;
  google.protobuf.Timestamp observed_at = 15;
}

message NetworkEdge {
  string src_id = 1;
  string dst_id = 2;
  double p50_latency_ms = 3;
  double p95_latency_ms = 4;
  double jitter_ms = 5;
  double loss_rate = 6;
  google.protobuf.Timestamp observed_at = 7;
}

message TrainingSpec {
  int32 gang_size = 1;
  int32 min_replicas = 2;
  int32 max_replicas = 3;
  repeated string allowed_accelerators = 4;
  double checkpoint_size_gib = 5;
  int64 deadline_unix_ms = 6;
  bool requires_same_zone = 7;
  bool requires_same_fault_domain = 8;
  bool topology_sensitive = 9;
  double max_budget_usd_per_hour = 10;
  double max_carbon_gco2_per_hour = 11;
}

message InferenceSpec {
  double target_qps = 1;
  double p95_slo_ms = 2;
  double p99_slo_ms = 3;
  int32 min_replicas = 4;
  int32 max_replicas = 5;
  bool can_use_spot = 6;
  bool requires_multi_zone = 7;
  int32 min_fault_domains = 8;
  double max_budget_usd_per_hour = 9;
  double max_carbon_gco2_per_hour = 10;
  double cold_start_penalty = 11;
}

message Task {
  string task_id = 1;
  TaskKind kind = 2;
  int32 priority = 3;
  double urgency = 4;
  google.protobuf.Timestamp arrival_time = 5;
  ResourceVector demand = 6;
  map<string, string> labels = 7;
  oneof spec {
    TrainingSpec training = 8;
    InferenceSpec inference = 9;
  }
}

message ObjectiveTerm {
  string name = 1;
  double raw_value = 2;
  double normalized_value = 3;
  double weight = 4;
  double contribution = 5;
}

message Candidate {
  string candidate_id = 1;
  string task_id = 2;
  repeated string node_ids = 3;
  string cluster_id = 4;
  string region = 5;
  double expected_cost_usd_per_hour = 6;
  double expected_carbon_gco2_per_hour = 7;
  double expected_p95_latency_ms = 8;
  double interruption_risk = 9;
  double topology_score = 10;
  repeated ObjectiveTerm objective_terms = 11;
}

message Assignment {
  string assignment_id = 1;
  string task_id = 2;
  repeated string node_ids = 3;
  string cluster_id = 4;
  string region = 5;
  double assigned_qps = 6;
  int32 assigned_replicas = 7;
  double expected_cost_usd_per_hour = 8;
  double expected_carbon_gco2_per_hour = 9;
  double expected_p95_latency_ms = 10;
  double interruption_risk = 11;
  repeated ObjectiveTerm objective_terms = 12;
}

message ConstraintEval {
  string constraint_id = 1;
  ConstraintKind kind = 2;
  string subject_id = 3;
  string expression = 4;
  double lhs = 5;
  RelOp op = 6;
  double rhs = 7;
  double slack = 8;
  bool satisfied = 9;
  string explanation = 10;
  repeated string related_ids = 11;
}

message BoundCertificate {
  SolverKind solver = 1;
  string status = 2;
  double incumbent_objective = 3;
  double best_bound = 4;
  double relative_gap = 5;
  double solve_time_ms = 6;
  bool timed_out = 7;
  string solver_log_hash = 8;
}

message FallbackReason {
  FallbackCode code = 1;
  string message = 2;
  repeated string related_constraints = 3;
}

message Counterfactual {
  string counterfactual_id = 1;
  string title = 2;
  google.protobuf.Struct delta = 3;
  bool feasible = 4;
  double expected_objective = 5;
  string explanation = 6;
}

message SnapshotRef {
  string snapshot_id = 1;
  string snapshot_hash = 2;
  string model_hash = 3;
  string policy_hash = 4;
  string solver_config_hash = 5;
  google.protobuf.Timestamp snapshot_time = 6;
}

message SnapshotMetadata {
  string snapshot_id = 1;
  string snapshot_hash = 2;
  int64 version = 3;
  google.protobuf.Timestamp snapshot_time = 4;
  repeated Node nodes = 5;
  repeated NetworkEdge network_edges = 6;
  map<string, string> labels = 7;
}

message DecisionBundle {
  string decision_id = 1;
  CertificateLevel certificate_level = 2;
  DecisionStatus decision_status = 3;
  SnapshotRef snapshot_ref = 4;
  repeated Task tasks = 5;
  repeated Candidate candidates = 6;
  repeated Assignment assignments = 7;
  repeated ConstraintEval constraint_evals = 8;
  BoundCertificate bound = 9;
  FallbackReason fallback = 10;
  repeated Counterfactual counterfactuals = 11;
  string prev_bundle_hash = 12;
  string bundle_hash = 13;
  string signer_key_id = 14;
  bytes signature = 15;
  google.protobuf.Timestamp created_at = 16;
}

message VerifyRequest {
  DecisionBundle bundle = 1;
  bool verify_signature = 2;
  bool verify_constraints = 3;
  bool verify_bound = 4;
  bool verify_counterfactuals = 5;
  bool strict_mode = 6;
}

message VerificationIssue {
  string code = 1;
  string message = 2;
  IssueSeverity severity = 3;
  repeated string related_ids = 4;
}

message ClaimCheck {
  string claim_id = 1;
  ClaimStatus status = 2;
  repeated string artifact_refs = 3;
  string summary = 4;
}

message VerifyResponse {
  bool valid = 1;
  bool signature_valid = 2;
  bool constraints_valid = 3;
  bool bound_valid = 4;
  bool counterfactuals_valid = 5;
  repeated VerificationIssue issues = 6;
  double verification_time_ms = 7;
  repeated ClaimCheck checked_claims = 8;
}

message ScheduleBatchRequest {
  repeated Task tasks = 1;
  SnapshotRef preferred_snapshot = 2;
  google.protobuf.Struct options = 3;
}

message GetDecisionBundleRequest {
  string decision_id = 1;
}

service SchedulerService {
  rpc ScheduleBatch(ScheduleBatchRequest) returns (DecisionBundle);
  rpc GetDecisionBundle(GetDecisionBundleRequest) returns (DecisionBundle);
}

service VerifierService {
  rpc VerifyDecision(VerifyRequest) returns (VerifyResponse);
}
